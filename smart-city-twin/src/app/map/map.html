<div id="cesiumContainer" class="full-window"></div>

<div class="calibration-panel glass-panel">
  <h3>Traffic Alignment Calibration</h3>
  <p>Adjust offsets to align traffic with 3D mesh.</p>
  
  <div class="control-group">
    <label>Longitude Offset (East/West)</label>
    <div class="slider-container">
      <input type="range" min="-0.005" max="0.005" step="0.00001" [(ngModel)]="lonOffset">
      <span>{{ lonOffset | number:'1.5-5' }}</span>
    </div>
  </div>

  <div class="control-group">
    <label>Latitude Offset (North/South)</label>
    <div class="slider-container">
      <input type="range" min="-0.005" max="0.005" step="0.00001" [(ngModel)]="latOffset">
      <span>{{ latOffset | number:'1.5-5' }}</span>
    </div>
  </div>

  <div class="control-group">
    <label>Elevation Offset (Z - meters)</label>
    <div class="slider-container">
      <input type="range" min="-50" max="50" step="1" [(ngModel)]="zOffset">
      <span>{{ zOffset }}m</span>
    </div>
  </div>
</div>
